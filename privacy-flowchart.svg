  <title
     id="title">Guard-e-loo Privacy Logic Flowchart</title>
  <desc
     id="desc">Flowchart showing privacy-first occupancy detection and image capture logic using redundant PIR sensors and other presence sensors.</desc>
  <defs
     id="defs1">
    <style
       id="style1">
      .bg { fill: #f7f4ec; }
      .title { font: 700 28px Georgia, &quot;Times New Roman&quot;, serif; fill: #1d2a33; }
      .subtitle { font: 400 15px Georgia, &quot;Times New Roman&quot;, serif; fill: #43535e; }
      .box { fill: #fffdf8; stroke: #1d2a33; stroke-width: 2.2; rx: 18; ry: 18; }
      .decision { fill: #fff8e8; stroke: #7a5c00; stroke-width: 2.2; }
      .privacy { fill: #e8f3ee; stroke: #2f6b57; stroke-width: 2.2; rx: 18; ry: 18; }
      .capture { fill: #edf4fb; stroke: #275b88; stroke-width: 2.2; rx: 18; ry: 18; }
      .optional { fill: #f3edf8; stroke: #6c4a8d; stroke-width: 2.2; rx: 18; ry: 18; }
      .warning { fill: #fbeaea; stroke: #9b2c2c; stroke-width: 2.2; rx: 18; ry: 18; }
      .text { font: 15px Arial, Helvetica, sans-serif; fill: #162027; }
      .small { font: 13px Arial, Helvetica, sans-serif; fill: #32424d; }
      .label { font: 13px Arial, Helvetica, sans-serif; font-weight: 700; fill: #162027; }
      .arrow { stroke: #31424d; stroke-width: 2.4; fill: none; marker-end: url(#arrowhead); }
      .dash { stroke-dasharray: 8 6; }
    </style>
